repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: build-latex-pdfs
        name: Build LaTeX PDFs
        description: Rebuild out-of-date PDFs from .tex/.bib sources
        entry: make
        language: system
        pass_filenames: false
        files: ^docs/.*\.(tex|bib)$

      - id: marimo-check
        name: marimo check
        entry: uv run marimo check --ignore-scripts
        language: system
        types: [python]
